{% extends "base.html" %}

{% block title %}
Answer Question
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-10">

        <div class="glass-card p-5">

            <div class="text-center">

                <h1>
                    🎤 AI Mock Interview
                </h1>

                <p class="text-light">
                    Answer the interview question below and receive AI evaluation.
                </p>

            </div>

            <hr class="text-light">

            <div class="glass-card p-4 mb-4">

                <h3>
                    ❓ Interview Question
                </h3>

                <hr>

                <h5> class="text-white">
                    {{ question }}
                </h5>

            </div>

            <form method="POST">

                <label class="form-label">
                    Your Answer
                </label>

                <textarea
                    name="answer"
                    rows="10"
                    class="form-control"
                    placeholder="Write your answer here..."
                    required>
                </textarea>

                <div class="text-center mt-4">

                    <button
                        type="submit"
                        class="btn btn-success btn-lg">

                        🚀 Submit Answer

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
