{% extends "base.html" %}

{% block title %}
Interview Evaluation
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-10">

        <div class="glass-card p-5">

            <div class="text-center">

                <h1>
                    🏆 Interview Evaluation
                </h1>

                <p class="text-light">
                    AI Feedback For Your Answer
                </p>

            </div>

            <hr class="text-light">

            <div class="glass-card p-4">

                <h3>
                    💡 AI Feedback
                </h3>

                <hr>

                <pre style="
                    white-space:pre-wrap;
                    color:white;
                    font-size:16px;
                ;">

{{ feedback }}

                </pre>

            </div>

            <div class="text-center mt-4">

                <a href="/questions"
                   class="btn btn-success me-3">

                    📚 Back To Questions

                </a>

                <a href="/dashboard"
                   class="btn btn-primary">

                    🏠 Dashboard

                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
