{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-5">

<div class="glass-card p-5">

<h2 class="text-center mb-4">
Welcome Back 👋
</h2>

<form method="POST">

<input
type="email"
name="email"
placeholder="Email"
class="form-control mb-3"
required>

<input
type="password"
name="password"
placeholder="Password"
class="form-control mb-3"
required>

<button
class="btn btn-primary w-100">

Login

</button>

</form>

<div class="text-center mt-3">

<a href="/register">

Create Account

</a>

</div>

</div>

</div>

</div>

{% endblock %}
