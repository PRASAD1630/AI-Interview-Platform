{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-5">

<div class="glass-card p-5">

<h2 class="text-center mb-4">
Create Account 🚀
</h2>

<form method="POST">

<input
type="text"
name="name"
placeholder="Full Name"
class="form-control mb-3"
required>

<input
type="email"
name="email"
placeholder="Email"
class="form-control mb-3"
required>

<input
type="password"
name="password"
placeholder="Password"
class="form-control mb-3"
required>

<button
class="btn btn-success w-100">

Register

</button>

</form>

</div>

</div>

</div>

{% endblock %}
